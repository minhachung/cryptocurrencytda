name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -q

  report:
    name: Synthetic-data results report
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pipeline on synthetic data
        run: python scripts/run_pipeline.py --synthetic
      - name: Generate markdown report -> step summary
        run: |
          python scripts/generate_report.py >> $GITHUB_STEP_SUMMARY
      - name: Upload figures as artifact
        uses: actions/upload-artifact@v4
        with:
          name: figures-synthetic
          path: figures/
          retention-days: 30
      - name: Upload results CSVs as artifact
        uses: actions/upload-artifact@v4
        with:
          name: results-synthetic
          path: results/
          retention-days: 30
