name: Real-data pipeline (manual)

# This workflow is *only* triggered manually. From the repo:
#   Actions tab -> "Real-data pipeline (manual)" -> "Run workflow"
# It fetches the basket from CoinGecko, runs the TDA pipeline, posts a
# markdown summary to the workflow page, and uploads results + figures
# as artifacts.

on:
  workflow_dispatch:
    inputs:
      source:
        description: 'Data source'
        required: true
        type: choice
        options:
          - yahoo
          - coingecko
        default: yahoo
      days:
        description: 'Days of history (or "max"). CoinGecko free tier <=365.'
        required: true
        default: "1825"
      window:
        description: 'Sliding window length in days'
        required: true
        default: "50"
      horizon:
        description: 'Forward-drawdown horizon in days'
        required: true
        default: "30"

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Fetch prices
        env:
          # Only used when source=coingecko. Optional: set as repo secrets to
          # unlock longer history / higher rate limits.
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          COINGECKO_DEMO_API_KEY: ${{ secrets.COINGECKO_DEMO_API_KEY }}
        run: |
          python scripts/fetch_data.py \
            --source "${{ github.event.inputs.source }}" \
            --days "${{ github.event.inputs.days }}" \
            --out data/prices.csv
          echo "Fetched price file:"
          python -c "import pandas as pd; df = pd.read_csv('data/prices.csv', index_col=0, parse_dates=True); print(df.shape, df.index.min().date(), '->', df.index.max().date()); print(df.tail())"
      - name: Run pipeline on real data
        run: |
          python scripts/run_pipeline.py \
            --prices data/prices.csv \
            --window "${{ github.event.inputs.window }}" \
            --horizon "${{ github.event.inputs.horizon }}"
      - name: Generate markdown report -> step summary
        run: |
          echo "# Real-data run (CoinGecko, ${{ github.event.inputs.days }} days)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          python scripts/generate_report.py >> $GITHUB_STEP_SUMMARY
      - name: Upload figures
        uses: actions/upload-artifact@v4
        with:
          name: figures-real
          path: figures/
          retention-days: 90
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: results-real
          path: results/
          retention-days: 90
      - name: Upload raw price data
        uses: actions/upload-artifact@v4
        with:
          name: prices-csv
          path: data/prices.csv
          retention-days: 90
